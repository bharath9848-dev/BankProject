<!DOCTYPE html>
<html>

<head>
    <title>ATM Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="logo">🏦</div>

        <h1>WELCOME TO ATM</h1>

            <button class="signup-btn">SIGN </button>

        </div>

    </div>

</body>

</html>
